# Railway service config for the backend (set the service Root Directory to
# "backend" in the Railway dashboard so this file and the Dockerfile are found).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
