services:
  postgres:
    image: postgres:16-alpine
    container_name: points-game-db
    environment:
      POSTGRES_USER: points
      POSTGRES_PASSWORD: points_local
      POSTGRES_DB: points_game
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U points -d points_game"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
